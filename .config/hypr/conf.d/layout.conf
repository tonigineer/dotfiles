
general {
    # hyprlang if HYPR_MASTER
    layout = master
    # hyprlang endif

    # hyprlang if HYPR_SCROLLING
    layout = scrolling
    # hyprlang endif

    # hyprlang if HYPR_DWINDLE
    layout = dwindle
    # hyprlang endif
}


dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
}


master {
    new_status = master
    new_on_top = true
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    # direction = down
}
